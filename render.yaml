# Render blueprint for the NIF backend (Django + PostgreSQL).
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Render reads this file, provisions the database + web service, and wires the
# env vars below. The web service uses the existing Dockerfile.backend, which
# runs migrate + collectstatic + gunicorn on start.
databases:
  - name: nif-db
    plan: free
    databaseName: leave_system
    user: leave_user

services:
  - type: web
    name: nif-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /api/v1/health/
    # Persist uploaded memo attachments across deploys/restarts. (For real
    # production, prefer object storage such as S3; the ephemeral FS on free
    # instances loses files without a disk.)
    disk:
      name: media
      mountPath: /app/media
      sizeGB: 1
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      # Generated once by Render and kept stable; satisfies the H6 boot guard.
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Leading dot = allow this service's *.onrender.com host (no wildcard "*").
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_ENGINE
        value: postgresql
      - key: DATABASE_HOST
        fromDatabase:
          name: nif-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: nif-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: nif-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: nif-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: nif-db
          property: password
      # The frontend calls the backend same-origin through the Vercel rewrite,
      # so CORS is normally unused. Keep disabled unless you switch to an
      # absolute cross-origin VITE_API_URL - then add CORS_ALLOWED_ORIGINS with
      # your Vercel domain in the dashboard.
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      # Public URLs for email action links + PDF QR verification. Entered in the
      # Render dashboard at deploy time (no hardcoded placeholders).
      - key: FRONTEND_URL
        sync: false
      - key: SITE_URL
        sync: false
      # Gunicorn tuning (safe defaults; raise workers on paid instances).
      - key: GUNICORN_WORKERS
        value: "3"
