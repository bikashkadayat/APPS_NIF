[tool.ruff]
target-version = "py310"
line-length = 120
# Auto-generated / vendored code is not linted.
extend-exclude = ["*/migrations/*", "*/__pycache__/*", "staticfiles", "media"]

[tool.ruff.lint]
# Critical correctness gate (green baseline): syntax errors, undefined names,
# invalid literal comparisons, f-string misuse. These catch real defects and the
# codebase passes them today. TODO: add F401 (unused imports, ~15 existing) and
# style rules once cleaned up, so the gate can tighten without a red day-one CI.
select = ["E9", "F63", "F7", "F82"]
